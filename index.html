<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    .header {
      background: linear-gradient(90deg, rgba(2,0,36,1) 0%, rgba(9,121,119,1) 11%, rgba(0,212,255,1) 41%);
      width: 100%;
      padding: 15px;
      text-align: center;
      color: #0093FF;
      font-family: 'Cormorant Garamond', serif;
      font-weight: bolder;
      font-size: 30px;
      font-family: "Noto Serif", serif;
      font-weight: 900;
      letter-spacing: 3px;
      font-style: italic;
    }
    .footer {
      margin-top: 165px;
      overflow: hidden;
      background-color: #333;
      padding: 30px;
    }
    #image-container {
      width: 750px;
      height: 500px;
      margin: 25px auto; 
    }
    #img1{
        width: 900px;
        height: 500px; 
        margin-left: -80px;
        margin-top: 25px; 
        border-radius: 15px;
        transition: left 5s cubic-bezier(0.0, 0.5, 0.5, 1.0);
    }
    button{
    background-color: #42caf3; 
      color: black;
      padding: 15px 86px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 32px;
      border: none;
      cursor: pointer;
      border-radius: 50px; 
      box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2); 
      transition: left 5s cubic-bezier(0.0, 0.5, 0.5, 1.0);
      margin-right: 250px;
      margin-left: 250px;
      margin-top:10px
      
    }
    button:hover{
        background-color: #1562f0;
    }
    a{
     padding: 0px 14px;
     text-decoration: none;
     color:white;
     font-size: 24px;
     font-weight: bold;
     display: block;
     float: left;
     letter-spacing: 2px;
     text-align: center;
     
     
    }
    a:hover {
  color: black;
  font-weight: bold;
 
    }
  </style>
</head>
<body>
  <div class="header">TouServ</div>
  <div id="image-container">
    <img id="img1" src="https://www.state.gov/wp-content/uploads/2023/07/shutterstock_667548661v2.jpg" >
  </div>

  <div style="text-align: center; margin-top: 10px;">
    <button id="prevButton">←</button>
    <button id="nextButton">→</button>
  </div>

  <script>
    const imageContainer = document.getElementById('image-container');
    const img1 = document.getElementById('img1');

    
    let imageUrls = [
      "https://www.state.gov/wp-content/uploads/2023/07/shutterstock_667548661v2.jpg",
      "https://media.timeout.com/images/105299605/image.jpg", 
      "https://tour-to-italy.com/images/articles/16.jpg", 
      "https://atlanttour.com.ua/wp-content/uploads/2023/10/photo_2023-07-28_10-02-06.jpg",
      "https://s.mind.ua/img/forall/a/202387/82.jpeg?1648634353", 
      "https://faktypro.com.ua/uploads/img/mini/niderlandi.jpg",

      "https://kidpassage.com/images/publications/gretsiya-oktyabre-otdyh-pogoda/gretsiya-oktyabre-otdyh-pogoda-photo1_904546334.jpg", 
      "https://liveandstudy.eu/wp-content/uploads/2020/07/krakow-poland-getty-seregalsv.jpg",
      "https://eufordigital.eu/wp-content/uploads/2019/08/Ukraine-1.jpg",
      "https://c4.wallpaperflare.com/wallpaper/228/607/807/ghent-flanders-belgium-wallpaper-preview.jpg",
      "https://tripmydream.cc/travelhub/travel/blocks/25/164/block_25164.jpg?v1", 
      "https://media.istockphoto.com/id/882881582/ru/%D1%84%D0%BE%D1%82%D0%BE/%D0%BF%D0%B5%D0%B9%D0%B7%D0%B0%D0%B6-%D0%B4%D1%83%D0%B1%D1%80%D0%BE%D0%B2%D0%BD%D0%B8%D0%BA%D0%B0-%D0%B0%D0%B4%D1%80%D0%B8%D0%B0%D1%82%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%BE%D0%B3%D0%BE-%D0%BC%D0%BE%D1%80%D1%8F.jpg?s=612x612&w=0&k=20&c=D3SKUngbdcdpYb8RHA2-2xuZVX7CMpFsFux9ZsW2jZM=", 
      "https://ave.com.ua/images/ave-photo/countries/Austria4.jpg",  
      "https://media.cntraveller.com/photos/611bf0fb7048754865719e3a/16:9/w_1920,h_1080,c_limit/view-of-the-liffey-from-liberty-hall-dublin-ireland-conde-nast-traveller-4feb16-Tara-Morgan.jpg", 
      "https://c4.wallpaperflare.com/wallpaper/218/264/7/mountains-norway-world-hd-wallpaper-preview.jpg", 
      "https://www.avantage-travel.com.ua/image/catalog/%D0%A1%D1%82%D1%80%D0%B0%D0%BD%D1%8B/%D0%94%D0%B0%D0%BD%D0%B8%D1%8F/%D0%94%D0%B0%D0%BD%D0%B8%D1%8F.jpg",

      "https://imin-malta.com/wp-content/uploads/2021/12/about-malta-462944234.jpeg",
      "https://anga.ua/files/anga/reg_images/3290147744_b30b468cfc_b.jpg" ,  
      "https://mer-ka-ba.com.ua/wp-content/uploads/2021/05/kipr.jpg", 
      "https://ogotour.com.ua/wp-content/uploads/sites/144/2022/02/Sozopol.jpg",  
      "https://www.avantage-travel.com.ua/image/catalog/%D0%A1%D1%82%D1%80%D0%B0%D0%BD%D1%8B/%D0%A1%D0%BB%D0%BE%D0%B2%D0%B5%D0%BD%D0%B8%D1%8F/%D0%A1%D0%BB%D0%BE%D0%B2%D0%B5%D0%BD%D0%B8%D1%8F.jpg", 
      "https://finevolution.pl/wp-content/uploads/2021/08/photoimg_1255012362.jpg",

      "https://finance-news-media.fra1.cdn.digitaloceanspaces.com/prod/1/5/159f6d89498570055e64de7a1a41d36b",
      "https://triplook.me/media/countries/photo/0/5/s.jpg",
      "https://trips.com.ua/wp-content/uploads/2022/10/monako.jpg"
    ];

    let currentImageIndex = 0;

    const prevButton = document.getElementById('prevButton');
    const nextButton = document.getElementById('nextButton');

    prevButton.addEventListener('click', () => {
      currentImageIndex--;
      if (currentImageIndex < 0) {
        currentImageIndex = imageUrls.length - 1;
      }
      img1.src = imageUrls[currentImageIndex];
    });

    nextButton.addEventListener('click', () => {
      currentImageIndex++;
      if (currentImageIndex >= imageUrls.length) {
        currentImageIndex = 0;
      }
      img1.src = imageUrls[currentImageIndex];
    });
  </script>

</html>
