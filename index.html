<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
        }

        h1{
            text-align: center;
            margin-top: 20px;
        }

        
        .one{
            width: 150px;
            height: 150px;
            background-color: rgb(53, 230, 91);
            position: absolute;
            left: 60px;
            top: 180px;
            transition: 1.2s;
        }

        .one:hover{
            background-color: orange;
            transform: rotate(45deg) scale(1.2);
        }

        
        .two{
            width: 150px;
            height: 150px;
            background-color: royalblue;
            position: absolute;
            right: 60px;
            top: 180px;
            transition: 1.5s;
        }

        .two:hover{
          background-color: purple;
          transform: rotate(-45deg) scale(1.2);
        }

        
        .photo-container{
            display: flex;
            justify-content: center;
            margin-top: 120px;
        }

        .inline-img{
            width: 350px;
            transition: 1s;
            border-radius: 15px;
            
        }

        .inline-img:hover{
            transform: scale(1.2);
        }

        
        .square{
            width: 100px;
            height: 100px;
            background-color: rgb(67, 168, 236);
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);

            animation-name: spin;
            animation-duration: 4s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        @keyframes spin{
            from{
                transform: translateX(-50%) rotate(0deg);
            }

            to{
                transform: translateX(-50%) rotate(360deg);
            }
        }

    </style>

</head>
<body>

    <h1>Анімації</h1>

    
    <div class="one"></div>

    
    <div class="two"></div>

    
    <div class="photo-container">
        <img src="https://pusheen.com/wp-content/uploads/2020/12/What-Sweet-Quiz-SocialResults_Donut-1-e1608220861325.jpg" class="inline-img">
    </div>

    
    <div class="square"></div>

</body>
</html>
